version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: niren-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      MYSQL_DATABASE: niren_drama
      MYSQL_CHARSET: utf8mb4
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: niren-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: niren_drama
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      NIREN_CONFIG_ENCRYPTION_KEY: ${NIREN_CONFIG_ENCRYPTION_KEY:-}
      UPLOAD_PATH: /app/uploads
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      AI_TEXT_PROVIDER: ${AI_TEXT_PROVIDER:-openai}
      AI_TEXT_BASE_URL: ${AI_TEXT_BASE_URL:-https://api.openai.com/v1}
      AI_TEXT_API_KEY: ${AI_TEXT_API_KEY:-}
      AI_TEXT_MODEL: ${AI_TEXT_MODEL:-gpt-4o}
      AI_IMAGE_PROVIDER: ${AI_IMAGE_PROVIDER:-openai}
      AI_IMAGE_BASE_URL: ${AI_IMAGE_BASE_URL:-https://api.openai.com/v1}
      AI_IMAGE_API_KEY: ${AI_IMAGE_API_KEY:-}
      AI_IMAGE_MODEL: ${AI_IMAGE_MODEL:-dall-e-3}
      AI_VIDEO_PROVIDER: ${AI_VIDEO_PROVIDER:-comfyui}
      AI_VIDEO_BASE_URL: ${AI_VIDEO_BASE_URL:-http://host.docker.internal:8188}
      AI_VIDEO_API_KEY: ${AI_VIDEO_API_KEY:-}
      AI_VIDEO_MODEL: ${AI_VIDEO_MODEL:-wan2.2_i2v_high_noise_14B_fp8_scaled.safetensors}
      NIREN_WAN22_TRAINING_ROOT: ${NIREN_WAN22_TRAINING_ROOT:-/app/wan22-video-training}
      NIREN_WAN22_TRAINER_ROOT: ${NIREN_WAN22_TRAINER_ROOT:-}
      NIREN_WAN22_MODEL_PATHS_JSON: ${NIREN_WAN22_MODEL_PATHS_JSON:-}
      NIREN_WAN22_COMMAND_TEMPLATE: ${NIREN_WAN22_COMMAND_TEMPLATE:-}
      NIREN_WAN22_OUTPUT_DIR: ${NIREN_WAN22_OUTPUT_DIR:-/app/wan22-video-training/checkpoints}
      NIREN_COS_ENABLED: ${NIREN_COS_ENABLED:-false}
      NIREN_COS_SECRET_ID: ${NIREN_COS_SECRET_ID:-}
      NIREN_COS_SECRET_KEY: ${NIREN_COS_SECRET_KEY:-}
      NIREN_COS_REGION: ${NIREN_COS_REGION:-ap-beijing}
      NIREN_COS_BUCKET: ${NIREN_COS_BUCKET:-}
      NIREN_COS_PUBLIC_BASE_URL: ${NIREN_COS_PUBLIC_BASE_URL:-}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: niren-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
  uploads_data:
