server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: niren-drama
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:niren_drama}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
  # data:
  #   redis:
  #     host: ${REDIS_HOST:localhost}
  #     port: ${REDIS_PORT:6379}
  #     password: ${REDIS_PASSWORD:}
  #     database: 0
  #     timeout: 5000ms
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

jwt:
  secret: ${JWT_SECRET:niren-drama-jwt-secret-key-2024-very-long-and-secure-string}
  expiration: 86400

niren:
  drama:
    line-doctor:
      enabled: ${NIREN_DRAMA_LINE_DOCTOR_ENABLED:true}
    dialogue:
      strip-speaker-prefix: ${NIREN_DRAMA_STRIP_SPEAKER_PREFIX:true}
      strip-narration-speaker-prefix: ${NIREN_DRAMA_STRIP_NARRATION_SPEAKER_PREFIX:false}
      dedupe-narration: ${NIREN_DRAMA_DEDUPE_NARRATION:true}
  upload:
    path: ${UPLOAD_PATH:./uploads}
    base-url: ${BASE_URL:http://localhost:8080}/api/files
  ai:
    text:
      provider: ${AI_TEXT_PROVIDER:openai}
      base-url: ${AI_TEXT_BASE_URL:https://api.openai.com/v1}
      api-key: ${AI_TEXT_API_KEY:}
      model: ${AI_TEXT_MODEL:gpt-4o}
      max-tokens: ${AI_TEXT_MAX_TOKENS:16384}
    sse:
      # 将每个模型分片再拆成若干小片下发（按 Unicode 码点计，0 表示不拆、原样透传）
      typewriter-code-points: ${NIREN_SSE_TYPEWRITER_CODE_POINTS:2}
    image:
      provider: ${AI_IMAGE_PROVIDER:aliyun}
      base-url: ${AI_IMAGE_BASE_URL:https://dashscope.aliyuncs.com/api/v1}
      api-key: ${AI_IMAGE_API_KEY:}
      model: ${AI_IMAGE_MODEL:qwen-image-2.0-pro}
    video:
      provider: ${AI_VIDEO_PROVIDER:comfyui}
      base-url: ${AI_VIDEO_BASE_URL:http://127.0.0.1:8188}
      api-key: ${AI_VIDEO_API_KEY:}
      model: ${AI_VIDEO_MODEL:wan2.2_i2v_high_noise_14B_fp8_scaled.safetensors}
    tts:
      provider: ${AI_TTS_PROVIDER:aliyun}
      base-url: ${AI_TTS_BASE_URL:https://dashscope.aliyuncs.com/api/v1}
      api-key: ${AI_TTS_API_KEY:}
      model: ${AI_TTS_MODEL:qwen3-tts-instruct-flash}
      voice: ${AI_TTS_VOICE:Cherry}
  cost:
    image-reuse-enabled: ${COST_IMAGE_REUSE:true}
    quality-tier: ${COST_QUALITY_TIER:standard}
    video-ai-enabled: ${COST_VIDEO_AI_ENABLED:false}
    video-ai-shot-ratio: ${COST_VIDEO_AI_RATIO:0.18}
    preview-resolution: ${COST_PREVIEW_RESOLUTION:1024x1024}
  image:
    retry:
      max-attempts: ${NIREN_IMAGE_RETRY_MAX_ATTEMPTS:3}
      backoff-ms: ${NIREN_IMAGE_RETRY_BACKOFF_MS:1200}
      concurrency-throttle-ms: ${NIREN_IMAGE_RETRY_THROTTLE_MS:220}
  dynamic-video:
    timeout-minutes: ${NIREN_DYNAMIC_VIDEO_TIMEOUT_MINUTES:720}
    chain:
      enabled: ${NIREN_DYNAMIC_VIDEO_CHAIN_ENABLED:false}
    reference:
      # 预览止血默认只喂主首帧，避免 Wan 参考图尺寸/节点兼容问题；需要多参考时用环境变量或 extra.maxReferenceImages 放开。
      max-images: ${NIREN_DYNAMIC_VIDEO_MAX_REFERENCE_IMAGES:1}
    retry:
      max-attempts: ${NIREN_DYNAMIC_VIDEO_RETRY_MAX_ATTEMPTS:2}
      backoff-seconds: ${NIREN_DYNAMIC_VIDEO_RETRY_BACKOFF_SECONDS:8}
    poll:
      base-seconds: ${NIREN_DYNAMIC_VIDEO_POLL_BASE_SECONDS:5}
      max-seconds: ${NIREN_DYNAMIC_VIDEO_POLL_MAX_SECONDS:30}
  dynamic-priority:
    # 目标动态镜头占比；默认走推荐器的 20/70 左右，A 档关键镜头优先动态化。
    target-dynamic-ratio: ${NIREN_TARGET_DYNAMIC_RATIO:0.29}
    # 预览阶段不再默认全量动态化，避免一次构建把所有镜头都送进 Wan/LTX。
    force-dynamic-by-default: ${NIREN_FORCE_DYNAMIC_BY_DEFAULT:false}
    # 动态镜头质量不理想时的最大重试次数（0=不重试）
    quality-max-retry: ${NIREN_DYNAMIC_QUALITY_MAX_RETRY:1}
  motion-tier:
    # 是否启用 A/B/C 分层动效策略（A=真i2v, B=轻动态, C=静帧基线）
    enabled: ${NIREN_MOTION_TIER_ENABLED:true}
  recommend:
    dynamic:
      enabled: ${NIREN_DYNAMIC_RECOMMEND_ENABLED:true}
      # 目标动态配比：20/70≈0.286，默认取 0.29
      max-ratio-per-episode: ${NIREN_DYNAMIC_RECOMMEND_MAX_RATIO_PER_EPISODE:0.29}
      # 每集最多推荐动态镜头数（与你当前目标一致）
      max-count-per-episode: ${NIREN_DYNAMIC_RECOMMEND_MAX_COUNT_PER_EPISODE:20}
      # 推荐最低分阈值：55 更容易凑齐20个；太高会推荐不足
      min-score-to-recommend: ${NIREN_DYNAMIC_RECOMMEND_MIN_SCORE:55}
  ffmpeg:
    path: ${FFMPEG_PATH:ffmpeg}
    ffprobe-path: ${FFPROBE_PATH:ffprobe}
  compose:
    # 单镜头内容时长上限（秒）。小说旁白 + 关键镜头展示适合更长镜头，目标约 10 秒。
    max-shot-duration-seconds: 10.0
    transition:
      # 默认转场时长（秒）。无明显情绪标签时使用；越小节奏越快。
      duration-seconds: ${COMPOSE_TRANSITION_DURATION:0.32}
      # 冲突镜头转场（秒）。用于吵架/对抗/打脸等快切场景。
      conflict-seconds: 0.2
      # 抒情镜头转场（秒）。用于回忆/告白/情绪铺陈等柔和场景。
      lyrical-seconds: 0.75
    audio:
      # 台词尾部补偿（秒）。防止人声被硬切；过大会拖沓。
      tail-padding-seconds: ${COMPOSE_AUDIO_TAIL_PADDING:0.22}
      # 镜头间停顿（秒）。用于“句间呼吸感”；建议 0.2-0.5。
      between-shots-seconds: 0.32
      # 是否对主人声做 loudnorm（统一响度，减少忽大忽小）。
      voice-loudnorm-enabled: ${COMPOSE_AUDIO_VOICE_LOUDNORM_ENABLED:true}
      # 是否启用 BGM ducking（有人声时自动压低 BGM）。
      ducking-enabled: ${COMPOSE_AUDIO_DUCKING_ENABLED:true}
      # ducking 门限。越小越容易触发压低（BGM 更“让路”给台词）。
      ducking-threshold: ${COMPOSE_AUDIO_DUCKING_THRESHOLD:0.028}
      # ducking 压缩比。越大压得越明显（台词更清楚，BGM 存在感更弱）。
      ducking-ratio: ${COMPOSE_AUDIO_DUCKING_RATIO:12}
      # ducking 起效速度（毫秒）。越小响应越快，适合快节奏短剧。
      ducking-attack: ${COMPOSE_AUDIO_DUCKING_ATTACK:8}
      # ducking 恢复速度（毫秒）。越大回升越慢，听感更平滑。
      ducking-release: ${COMPOSE_AUDIO_DUCKING_RELEASE:220}
    sync:
      # 是否启用“语音时长驱动切镜”（优先按真实音频时长定镜头长度）。
      voice-driven-enabled: ${COMPOSE_SYNC_VOICE_DRIVEN_ENABLED:true}
      # 语音驱动时额外停顿（秒）。建议 0.2-0.5；提升口语节奏。
      pause-seconds: ${COMPOSE_SYNC_PAUSE_SECONDS:0.32}
      # 允许超过分镜时长的最大补偿（秒）。越大越不容易“语音没说完就切镜”。
      max-overrun-seconds: ${COMPOSE_SYNC_MAX_OVERRUN_SECONDS:0.9}
    ambient:
      source: ${COMPOSE_AMBIENT_SOURCE:}
      # 环境音音量。建议 0.04-0.12；过大会盖住人声。
      volume: 0.06
    rhythm:
      # 连续静帧过长时，自动给静态镜头加“轻动态”（微推拉/微漂移）。
      auto-micro-motion-enabled: ${COMPOSE_RHYTHM_AUTO_MICRO_MOTION_ENABLED:true}
      # 连续静态总时长阈值（秒）。超过后触发轻动态。
      max-static-seconds: ${COMPOSE_RHYTHM_MAX_STATIC_SECONDS:8}
      # 连续静态镜头数阈值。超过后触发轻动态。
      max-static-shots: ${COMPOSE_RHYTHM_MAX_STATIC_SHOTS:2}
    # 词级时间轴/停顿精同步需厂商返回时间戳，当前以镜头时长+句间静音+转场为主
    subtitle:
      # 是否烧录字幕。
      enabled: ${COMPOSE_SUBTITLE_ENABLED:true}
      # 是否把旁白并入上屏字幕。短剧常用 false（上屏更干净）。
      include-narration: ${COMPOSE_SUBTITLE_INCLUDE_NARRATION:false}
      # 是否去掉“角色名：”前缀，避免字幕出现“人名+冒号”。
      strip-speaker-prefix: ${COMPOSE_SUBTITLE_STRIP_SPEAKER_PREFIX:true}
      font-path: ${COMPOSE_SUBTITLE_FONT_PATH:C:/Windows/Fonts/msyh.ttc}
      # 字幕字号。大屏可降，小屏可升；建议 46-56。
      font-size: ${COMPOSE_SUBTITLE_FONT_SIZE:52}
      # 距底边留白（像素）。增大可避免压住 UI/进度条。
      margin-bottom: ${COMPOSE_SUBTITLE_MARGIN_BOTTOM:170}
    bgm:
      source: ${COMPOSE_BGM_SOURCE:classpath:assets/bgm_default.wav}
      # 背景音乐基础音量。建议 0.08-0.16（配合 ducking）。
      volume: ${COMPOSE_BGM_VOLUME:0.12}
    transition-sfx:
      # 默认转场音效（未命中情绪专用音效时兜底）。
      source: ${COMPOSE_TRANSITION_SFX_SOURCE:classpath:assets/zc_default.wav}
      # 冲突场景转场音效（快切 whoosh/冲击感）。
      conflict-source: ${COMPOSE_TRANSITION_CONFLICT_SFX_SOURCE:}
      # 抒情场景转场音效（柔和尾音/气氛衔接）。
      lyrical-source: ${COMPOSE_TRANSITION_LYRICAL_SFX_SOURCE:}
      # 是否按情绪自动选择 conflict/lyrical 音效。
      follow-emotion-enabled: ${COMPOSE_TRANSITION_SFX_FOLLOW_EMOTION:true}
      # 转场音效音量。建议 0.1-0.2；过大会“抢戏”。
      volume: ${COMPOSE_TRANSITION_SFX_VOLUME:0.15}
    export:
      # 导出档位：preview（预览快）/publish（发布质感优先）。
      profile: ${COMPOSE_EXPORT_PROFILE:preview}
      preview:
        video-codec: ${COMPOSE_EXPORT_PREVIEW_VIDEO_CODEC:h264_nvenc}
        # 预览编码速度档。越快越省时，画质略降。
        preset: ${COMPOSE_EXPORT_PREVIEW_PRESET:veryfast}
        # 预览 CRF。越大码率越低、体积越小、画质越低。
        crf: ${COMPOSE_EXPORT_PREVIEW_CRF:24}
        # 预览音频码率。
        audio-bitrate: ${COMPOSE_EXPORT_PREVIEW_AUDIO_BITRATE:128k}
      publish:
        video-codec: ${COMPOSE_EXPORT_PUBLISH_VIDEO_CODEC:libx264}
        # 发布编码速度档。越慢通常画质越稳、耗时越长。
        preset: ${COMPOSE_EXPORT_PUBLISH_PRESET:faster}
        # 发布 CRF。建议 17-20；越小画质越好体积越大。
        crf: ${COMPOSE_EXPORT_PUBLISH_CRF:20}
        # 发布音频码率（对白细节更充足）。
        audio-bitrate: ${COMPOSE_EXPORT_PUBLISH_AUDIO_BITRATE:160k}
    segmented:
      enabled: ${COMPOSE_SEGMENTED_ENABLED:true}
      max-shots-per-segment: ${COMPOSE_MAX_SHOTS_PER_SEGMENT:12}
    narration:
      # 是否启用整集连续旁白轨（读小说融合）
      enabled: ${COMPOSE_NARRATION_ENABLED:true}
      # 旁白基础音量（对白优先场景建议 0.15-0.28）
      volume: ${COMPOSE_NARRATION_VOLUME:0.22}
      # 对白存在时是否自动压低旁白
      ducking-when-dialogue: ${COMPOSE_NARRATION_DUCKING_WHEN_DIALOGUE:true}
      # 单段旁白最大时长（秒），用于形成连续小说旁白轨。
      max-segment-seconds: ${COMPOSE_NARRATION_MAX_SEGMENT_SECONDS:8.0}
      # 冲突镜头是否暂停旁白；默认不中断，交给 ducking 自动让位。
      pause-on-conflict: ${COMPOSE_NARRATION_PAUSE_ON_CONFLICT:false}
    mix:
      # 是否启用对白绝对优先混音策略
      dialogue-priority: ${COMPOSE_MIX_DIALOGUE_PRIORITY:true}
      # 对白结束后旁白恢复时间（毫秒）
      narration-recover-ms: ${COMPOSE_MIX_NARRATION_RECOVER_MS:280}
      # 旁白让位触发阈值（越小越容易让位）
      dialogue-threshold: ${COMPOSE_MIX_DIALOGUE_THRESHOLD:0.035}
  storage:
    cos:
      enabled: ${NIREN_COS_ENABLED:false}
      secret-id: ${NIREN_COS_SECRET_ID:}
      secret-key: ${NIREN_COS_SECRET_KEY:}
      region: ${NIREN_COS_REGION:ap-beijing}
      bucket: ${NIREN_COS_BUCKET:}
      public-base-url: ${NIREN_COS_PUBLIC_BASE_URL:}
      base-path: ${NIREN_COS_BASE_PATH:niren-drama}

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  file:
    name: ${LOG_FILE:${user.dir}/log/niren-drama.log}
  charset:
    console: UTF-8
    file: UTF-8
  level:
    root: info
    com.niren.drama: debug
    com.niren.drama.mapper: debug
    org.mybatis: debug
    com.baomidou.mybatisplus: debug
    org.springframework.security: debug
    com.qcloud.cos: warn
    org.apache.http: warn
    org.apache.http.wire: off
    org.apache.http.headers: off
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
