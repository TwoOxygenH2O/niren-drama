server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: niren-drama
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:niren_drama}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
  # data:
  #   redis:
  #     host: ${REDIS_HOST:localhost}
  #     port: ${REDIS_PORT:6379}
  #     password: ${REDIS_PASSWORD:}
  #     database: 0
  #     timeout: 5000ms
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

jwt:
  secret: ${JWT_SECRET:niren-drama-jwt-secret-key-2024-very-long-and-secure-string}
  expiration: 86400

niren:
  upload:
    path: ${UPLOAD_PATH:./uploads}
    base-url: ${BASE_URL:http://localhost:8080}/api/files
  ai:
    text:
      provider: ${AI_TEXT_PROVIDER:openai}
      base-url: ${AI_TEXT_BASE_URL:https://api.openai.com/v1}
      api-key: ${AI_TEXT_API_KEY:}
      model: ${AI_TEXT_MODEL:gpt-4o}
      max-tokens: ${AI_TEXT_MAX_TOKENS:8192}
    image:
      provider: ${AI_IMAGE_PROVIDER:aliyun}
      base-url: ${AI_IMAGE_BASE_URL:https://dashscope.aliyuncs.com/api/v1}
      api-key: ${AI_IMAGE_API_KEY:}
      model: ${AI_IMAGE_MODEL:qwen-image-2.0-pro}
    video:
      provider: ${AI_VIDEO_PROVIDER:aliyun}
      base-url: ${AI_VIDEO_BASE_URL:https://dashscope.aliyuncs.com/api/v1}
      api-key: ${AI_VIDEO_API_KEY:}
      model: ${AI_VIDEO_MODEL:wan2.7-i2v}
    tts:
      provider: ${AI_TTS_PROVIDER:aliyun}
      base-url: ${AI_TTS_BASE_URL:https://dashscope.aliyuncs.com/api/v1}
      api-key: ${AI_TTS_API_KEY:}
      model: ${AI_TTS_MODEL:qwen3-tts-instruct-flash}
      voice: ${AI_TTS_VOICE:Cherry}
  cost:
    image-reuse-enabled: ${COST_IMAGE_REUSE:true}
    quality-tier: ${COST_QUALITY_TIER:standard}
    video-ai-enabled: ${COST_VIDEO_AI_ENABLED:false}
    video-ai-shot-ratio: ${COST_VIDEO_AI_RATIO:0.3}
    preview-resolution: ${COST_PREVIEW_RESOLUTION:1024x1024}
  ffmpeg:
    path: ${FFMPEG_PATH:D:\\JavaSoft\\ffmpeg-master-latest-win64-gpl-shared\\bin\\ffmpeg.exe}
    ffprobe-path: ${FFPROBE_PATH:D:\\JavaSoft\\ffmpeg-master-latest-win64-gpl-shared\\bin\\ffprobe.exe}
  compose:
    transition:
      duration-seconds: ${COMPOSE_TRANSITION_DURATION:0.45}
    audio:
      tail-padding-seconds: ${COMPOSE_AUDIO_TAIL_PADDING:0.35}
    subtitle:
      enabled: ${COMPOSE_SUBTITLE_ENABLED:true}
      font-path: ${COMPOSE_SUBTITLE_FONT_PATH:C:/Windows/Fonts/msyh.ttc}
      font-size: ${COMPOSE_SUBTITLE_FONT_SIZE:54}
      margin-bottom: ${COMPOSE_SUBTITLE_MARGIN_BOTTOM:160}
    bgm:
      source: ${COMPOSE_BGM_SOURCE:classpath:assets/bgm_default.wav}
      volume: ${COMPOSE_BGM_VOLUME:0.16}
    transition-sfx:
      source: ${COMPOSE_TRANSITION_SFX_SOURCE:classpath:assets/zc_default.wav}
      volume: ${COMPOSE_TRANSITION_SFX_VOLUME:0.18}
  storage:
    cos:
      enabled: ${NIREN_COS_ENABLED:true}
      secret-id: ${NIREN_COS_SECRET_ID:AKIDzZ0nUzGQWQ6g6IRMftvj5GH6h5I1YrhL}
      secret-key: ${NIREN_COS_SECRET_KEY:VntoY5OVmxwhGrJnCQTQGtEOMCpDMM8g}
      region: ${NIREN_COS_REGION:ap-beijing}
      bucket: ${NIREN_COS_BUCKET:niren-1310485284}
      public-base-url: ${NIREN_COS_PUBLIC_BASE_URL:https://niren-1310485284.cos.ap-beijing.myqcloud.com}
      base-path: ${NIREN_COS_BASE_PATH:niren-drama}

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  file:
    name: ${LOG_FILE:${user.dir}/log/niren-drama.log}
  level:
    root: debug
    com.niren.drama: debug
    com.niren.drama.mapper: debug
    org.mybatis: debug
    com.baomidou.mybatisplus: debug
    org.springframework.security: debug
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
