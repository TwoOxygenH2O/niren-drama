# Quality gate draft config.

run:
  name: niren_quality_gate_v001
  output_dir: training/short-drama-video-training/runs/quality_gate_v001

data:
  labels_csv: training/short-drama-video-training/data/manifests/quality_labels.v001.csv
  frame_root: training/short-drama-video-training/processed/quality_gate
  input_type: first_mid_last_frame_triplet
  split_by_project: true

labels:
  - black_frame
  - frozen_frame
  - line_art
  - identity_drift
  - costume_drift
  - extra_person
  - wrong_aspect_ratio
  - duration_out_of_range

model:
  family: image_classifier
  candidate_backbones:
    - convnext_tiny
    - mobilenet_v3_large
    - vit_base_patch16

training:
  image_size: 384
  batch_size: 16
  learning_rate: 0.0001
  epochs: 20
  loss: multilabel_bce
  augmentations:
    - color_jitter_light
    - resize_crop_safe

acceptance:
  macro_f1_min: 0.75
  blocking_precision_min: 0.90
  false_block_rate_max: 0.05
